,"Accession: RF00001 - 5S ribosomal RNA","HEMA_I73A5 - Experimental evidence at protein level: Swiss-Prot protein existence level 1. Binds to sialic acid-containing receptors on the cell surface, bringing about the attachment of the virus particle to the cell. This attachment induces virion internalization either through clathrin-dependent endocytosis or through clathrin- and caveolin- independent pathway. Plays a major role in the determination of host range restriction and virulence. Class I viral fusion protein. Responsible for penetration of the virus into the cell cytoplasm by mediating the fusion of the membrane of the endocytosed virus particle with the endosomal membrane. Low pH in endosomes induces an irreversible conformational change in HA2, releasing the fusion hydrophobic peptide. Several trimers are required to form a competent fusion pore. From Influenza A virus (strain A/Port Chalmers/1/1973 H3N2).","HEMA_I70A0 - Experimental evidence at protein level: Swiss-Prot protein existence level 1. Binds to sialic acid-containing receptors on the cell surface, bringing about the attachment of the virus particle to the cell. This attachment induces virion internalization of about two third of the virus particles through clathrin-dependent endocytosis and about one third through a clathrin- and caveolin-independent pathway. Plays a major role in the determination of host range restriction and virulence. Class I viral fusion protein. Responsible for penetration of the virus into the cell cytoplasm by mediating the fusion of the membrane of the endocytosed virus particle with the endosomal membrane. Low pH in endosomes induces an irreversible conformational change in HA2, releasing the fusion hydrophobic peptide. Several trimers are required to form a competent fusion pore. From Influenza A virus (strain A/Qu/7/1970 H3N2).","contains a 21-bp deletion relative to the standard chicken \u03b2-actin promoter"],"Feature":["AmpR promoter","rrnB T1 terminator","AmpR","o
